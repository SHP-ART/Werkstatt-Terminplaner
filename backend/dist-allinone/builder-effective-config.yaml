directories:
  output: dist-allinone
  buildResources: build
appId: com.example.werkstatt-terminplaner-complete
productName: Werkstatt Terminplaner
files:
  - filter:
      - electron-main.js
      - electron-preload.js
      - status.html
      - status.js
      - src/
      - database/
      - .env
extraResources:
  - from: ../frontend
    to: frontend
    filter:
      - '**/*'
      - '!node_modules/**'
      - '!*.md'
win:
  target: portable
  icon: null
electronVersion: 39.2.7
